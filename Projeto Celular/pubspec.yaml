name: eficem_pilot
description: "EFICEM Telemetry - Pilot Interface & 5G Gateway for Shell Eco-marathon 2026"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Bluetooth BLE
  flutter_blue_plus: ^2.2.1

  # MQTT Client
  mqtt_client: ^10.11.9

  # Local Database (buffer)
  sqflite: ^2.4.1
  path: ^1.9.0

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  wakelock_plus: ^1.3.1
  flutter_svg: ^2.0.17

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^7.1.0
  permission_handler: ^12.0.1
  typed_data: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.14
  mockito: ^5.4.6
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
